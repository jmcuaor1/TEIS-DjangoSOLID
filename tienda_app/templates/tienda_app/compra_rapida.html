<!DOCTYPE html>
<html>
<head>
    <title>Compra Rápida - Tutorial SOLID</title>
</head>
<body>
    <h1>Compra Rapida (Modo Spaghetti)</h1>

    {% if mensaje_exito %}
        <div style="color: green; font-weight: bold;">{{ mensaje_exito }}</div>
        <a href="/">Volver a la tienda</a>
    {% else %}
        {% if error %}
            <div style="color: red; border: 1px solid red; padding: 10px;">
                {{ error }}
            </div>
        {% endif %}

        <p>Libro: <strong>{{ libro.titulo }}</strong></p>
        <p>Precio Final (IVA): ${{ total }}</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" style="background: orange; padding: 10px 20px; 
            color: white; border: none; cursor: pointer;">
                Comprar Ya
            </button>
        </form>
    {% endif %}
</body>
</html>
